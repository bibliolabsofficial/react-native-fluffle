name: Bug Report
description: Report a bug or regression in React Native Fluffle.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: The app crashes when...
    valudations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install package
        2. Enable Hermes
        3. Run development build
      validations:
        required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.1
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - All platforms
        - Other
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: JavaScript engine
      options:
        - Hermes
        - JSC
        - Unknown

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      render: shell
